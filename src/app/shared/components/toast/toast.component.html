<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[9999] flex flex-col-reverse gap-3 w-full max-w-sm px-4 pointer-events-none">
  @for (t of toasts; track t.id) {
    <div 
      [ngClass]="{
        'bg-green-600 shadow-green-900/20': t.type === 'success',
        'bg-red-600 shadow-red-900/20': t.type === 'error'
      }"
      class="pointer-events-auto flex items-center justify-between p-4 text-white rounded-2xl shadow-2xl animate-bounce-in-bottom border border-white/10 backdrop-blur-md"
    >
      <div class="flex items-center gap-3">
        @if (t.type === 'success') {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        }
        <span class="text-sm font-bold tracking-wide">{{ t.text }}</span>
      </div>
      <button (click)="remove(t.id)" class="hover:bg-white/20 p-1 rounded-full transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
