<div class="relative">
  <button
    (click)="toggleChat()"
    class="relative flex items-center justify-center w-10 h-10 text-gray-700 bg-gray-100 rounded-full hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 transition-colors"
    [ngClass]="{ 'bg-brand-100 text-brand-600 dark:bg-brand-900/30': isOpen() }"
    title="Asistente de IA"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="w-5 h-5"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"
      />
      <path
        d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"
      />
    </svg>

    @if (apiStatus() === "online") {
      <span
        class="absolute top-0 right-0 w-2.5 h-2.5 bg-brand-500 border-2 border-white rounded-full dark:border-gray-900"
      ></span>
    } @else {
      <span
        class="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full dark:border-gray-900"
      ></span>
    }
  </button>

  <div
    *ngIf="isOpen()"
    class="absolute right-0 top-full mt-3 w-[350px] sm:w-[450px] bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 flex flex-col h-[550px] z-[99999] overflow-hidden animate-in fade-in slide-in-from-top-4 duration-200"
  >
    <div
      class="px-5 py-4 bg-brand-600 flex justify-between items-center text-white"
    >
      <div class="flex items-center gap-3">
        <div
          class="h-9 w-9 bg-white/20 rounded-full flex items-center justify-center text-lg"
        >
          🤖
        </div>
        <div>
          <h3 class="font-semibold text-sm">Asistente OSZ</h3>
          <p class="text-xs text-brand-100 flex items-center gap-1">
            @if (apiStatus() === "online") {
              <span
                class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block"
              ></span>
              En línea (Groq)
            } @else {
              <span
                class="w-1.5 h-1.5 bg-red-400 rounded-full inline-block"
              ></span>
              Desconectado
            }
          </p>
        </div>
      </div>
      <button
        (click)="closeChat()"
        class="text-white/70 hover:text-white transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div
      #scrollContainer
      class="flex-1 p-4 overflow-y-auto bg-gray-50 dark:bg-gray-800/50 space-y-4"
    >
      <div
        *ngFor="let msg of messages()"
        [ngClass]="{
          'justify-end': msg.role === 'user',
          'justify-start': msg.role === 'assistant',
        }"
        class="flex w-full"
      >
        <div
          [ngClass]="{
            'bg-brand-500 text-white rounded-tr-sm': msg.role === 'user',
            'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700 rounded-tl-sm':
              msg.role === 'assistant',
          }"
          class="max-w-[85%] p-3 rounded-2xl text-sm shadow-sm leading-relaxed whitespace-pre-wrap"
        >
          {{ msg.content }}
        </div>
      </div>

      <div *ngIf="isLoading()" class="flex justify-start">
        <div
          class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-3.5 rounded-2xl rounded-tl-sm shadow-sm flex items-center gap-1.5"
        >
          <span
            class="w-1.5 h-1.5 bg-brand-400 rounded-full animate-bounce"
          ></span>
          <span
            class="w-1.5 h-1.5 bg-brand-400 rounded-full animate-bounce"
            style="animation-delay: 0.15s"
          ></span>
          <span
            class="w-1.5 h-1.5 bg-brand-400 rounded-full animate-bounce"
            style="animation-delay: 0.3s"
          ></span>
        </div>
      </div>
    </div>

    <div
      class="p-4 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800"
    >
      <div class="relative flex items-center">
        <input
          [(ngModel)]="userInput"
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading()"
          placeholder="Escribe tu consulta aquí..."
          class="w-full text-sm rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 py-3 pl-4 pr-12 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all disabled:opacity-60"
        />
        <button
          (click)="sendMessage()"
          [disabled]="isLoading() || !userInput.trim()"
          class="absolute right-2 p-1.5 text-brand-600 bg-brand-50 dark:bg-brand-500/10 hover:bg-brand-100 dark:hover:bg-brand-500/20 rounded-lg disabled:opacity-40 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 rotate-90"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
            />
          </svg>
        </button>
      </div>
      <p class="text-center text-[10px] text-gray-400 dark:text-gray-500 mt-2">
        Powered by Groq & Llama 3
      </p>
    </div>
  </div>
</div>
