<div class="max-w-4xl mx-auto p-4">
  <div class="flex items-center gap-3 mb-4">
    <input
      id="areaName"
      #areaName
      type="text"
      placeholder="Nombre del área"
      class="flex-1 h-10 px-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-400"
    />
    <button
      (click)="addArea(areaName.value); areaName.value = ''"
      class="inline-flex items-center gap-2 px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600"
    >
      Añadir Área
    </button>
  </div>

  @if (isLoading()) {
    <div class="py-6 text-center text-gray-500">Cargando...</div>
  } @else {
    <div
      class="overflow-hidden bg-white rounded-lg shadow-sm border border-gray-200"
    >
      <div class="overflow-x-auto">
        <table class="min-w-full text-left">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-sm font-medium text-gray-600">ID</th>
              <th class="px-4 py-3 text-sm font-medium text-gray-600">
                Nombre
              </th>
            </tr>
          </thead>
          <tbody>
            @for (area of paginatedAreas(); track area.id) {
              <tr class="border-t hover:bg-gray-50">
                <td class="px-4 py-3 text-sm text-gray-700">{{ area.id }}</td>
                <td class="px-4 py-3 text-sm text-gray-700">
                  {{ area.nombre }}
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      <div
        class="flex items-center justify-between px-4 py-3 border-t border-gray-200 bg-gray-50 sm:px-6"
      >
        <div class="hidden sm:block">
          <p class="text-sm text-gray-700">
            Mostrando página
            <span class="font-medium">{{ currentPage() }}</span> de
            <span class="font-medium">{{ totalPages() || 1 }}</span>
            (Total: <span class="font-medium">{{ areas().length }}</span> áreas)
          </p>
        </div>
        <div class="flex justify-between flex-1 sm:justify-end gap-2">
          <button
            (click)="prevPage()"
            [disabled]="currentPage() === 1"
            class="relative inline-flex items-center px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Anterior
          </button>
          <button
            (click)="nextPage()"
            [disabled]="currentPage() >= totalPages() || totalPages() === 0"
            class="relative inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-brand-500 border border-transparent rounded-md hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-brand-500"
          >
            Siguiente
          </button>
        </div>
      </div>
    </div>
  }
</div>
