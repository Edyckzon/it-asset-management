<div class="max-w-5xl mx-auto p-4">
  <div class="bg-white rounded-lg shadow p-4 mb-6">
    <form
      [formGroup]="empleadoForm"
      (ngSubmit)="onSubmit()"
      class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end"
    >
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Nombre completoo</label
        >
        <input
          formControlName="nombre_completo"
          type="text"
          placeholder="Juan Pérez"
          class="w-full h-10 px-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-400"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Área</label>
        <select
          formControlName="area_id"
          class="w-full h-10 px-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-400"
        >
          <option value="">Selecciona un área</option>
          @for (area of areas(); track area.id) {
          <option value="{{ area.id }}">{{ area.nombre }}</option>
          }
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"
          >Cargo</label
        >
        <input
          formControlName="cargo"
          type="text"
          placeholder="Analista"
          class="w-full h-10 px-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-400"
        />
      </div>

      <div class="md:col-span-3 text-right mt-2">
        <button
          type="submit"
          class="inline-flex items-center gap-2 px-4 py-2 bg-brand-500 text-white rounded-lg hover:bg-brand-600"
        >
          Registrar Empleado
        </button>
      </div>
    </form>
  </div>

  @if (isLoading()) {
  <div class="py-6 text-center text-gray-500">Cargando empleados...</div>
  } @else {
  <div class="overflow-x-auto bg-white rounded-lg shadow-sm">
    <table class="min-w-full text-left">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-3 text-sm font-medium text-gray-600">Nombre</th>
          <th class="px-4 py-3 text-sm font-medium text-gray-600">Área</th>
          <th class="px-4 py-3 text-sm font-medium text-gray-600">Cargo</th>
          <th class="px-4 py-3 text-sm font-medium text-gray-600">Estado</th>
          <th class="px-4 py-3 text-sm font-medium text-gray-600">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (emp of empleados(); track emp.id) {
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3 text-sm text-gray-700">
            {{ emp.nombre_completo }}
          </td>
          <td class="px-4 py-3 text-sm text-gray-700">
            {{ emp.areas?.nombre || "-" }}
          </td>
          <td class="px-4 py-3 text-sm text-gray-700">{{ emp.cargo }}</td>
          <td class="px-4 py-3 text-sm text-gray-700">
            {{ emp.estado ? "Activo" : "Inactivo" }}
          </td>
          <td class="px-4 py-3 text-sm text-gray-700">
            <button (click)="onDelete(emp)" title="Eliminar" class="text-red-600 hover:text-red-800 inline-flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H3a1 1 0 000 2h14a1 1 0 100-2h-2V3a1 1 0 00-1-1H6zm2 5a1 1 0 012 0v6a1 1 0 11-2 0V7zm4 0a1 1 0 10-2 0v6a1 1 0 102 0V7z" clip-rule="evenodd" />
              </svg>
            </button>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
  }
</div>
