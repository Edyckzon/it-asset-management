<div class="grid grid-cols-12 gap-4 md:gap-6">
  <!-- Top cards: Totales TI -->
  <div class="col-span-12 md:col-span-4">
    <div class="p-6 rounded-lg shadow-md bg-blue-600 text-white">
      <div class="text-sm">Total Empleados</div>
      <div class="text-3xl font-bold mt-2">{{ totalEmpleados() }}</div>
    </div>
  </div>

  <div class="col-span-12 md:col-span-4">
    <div class="p-6 rounded-lg shadow-md bg-green-600 text-white">
      <div class="text-sm">Activos Disponibles</div>
      <div class="text-3xl font-bold mt-2">{{ activosDisponibles() }}</div>
    </div>
  </div>

  <div class="col-span-12 md:col-span-4">
    <div class="p-6 rounded-lg shadow-md bg-red-600 text-white">
      <div class="text-sm">Activos Asignados</div>
      <div class="text-3xl font-bold mt-2">{{ activosAsignados() }}</div>
    </div>
  </div>

  <!-- Últimos movimientos -->
  <div class="col-span-12 mt-4">
    <div class="p-4 bg-white rounded-lg shadow-sm">
      <h3 class="text-lg font-semibold mb-3">Últimos movimientos</h3>
      <div *ngIf="!ultimosMovimientos().length" class="text-sm text-gray-500">
        No hay movimientos recientes.
      </div>
      <ul *ngIf="ultimosMovimientos().length" class="divide-y">
        <li *ngFor="let m of ultimosMovimientos()" class="py-2">
          <div class="text-sm font-medium text-gray-500">
            {{ m.fecha | date : "short" }}
          </div>
          <div class="text-sm">
            <strong>{{ m.modulo }}</strong> — {{ m.detalle }}
          </div>
        </li>
      </ul>
    </div>
  </div>

  <!-- Mantener componentes existentes del dashboard debajo -->
  <div class="col-span-12 space-y-6 xl:col-span-7">
    <div><app-ecommerce-metrics /></div>

    <div><app-monthly-sales-chart /></div>
  </div>

  <div class="col-span-12 xl:col-span-5">
    <app-monthly-target />
  </div>

  <div class="col-span-12">
    <app-statics-chart />
  </div>

  <div class="col-span-12 xl:col-span-5">
    <app-demographic-card />
  </div>

  <div class="col-span-12 xl:col-span-7">
    <app-recent-orders />
  </div>
</div>
